<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"/>
<title>El Rosco — Pasapalabra</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;height:100dvh;background:#111;overflow:hidden;font-family:'Nunito',sans-serif;touch-action:none;}
#stage{position:fixed;inset:0;background:#000;overflow:hidden;}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);z-index:0;display:none;}
#overlay{position:absolute;inset:0;z-index:10;}
#rosco-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
/* Floating mic button — bottom right, thumb-friendly */
#mic-float{position:absolute;right:0;bottom:0;z-index:40;border-radius:50%;border:3px solid rgba(255,255,255,.7);background:radial-gradient(circle at 36% 28%,#7ab4ff,#1a4aaa);color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(30,80,220,.6),inset 0 2px 0 rgba(255,255,255,.3);touch-action:none;user-select:none;-webkit-user-select:none;transition:background .2s,box-shadow .2s;}
#mic-float.active-game{display:flex;}
#mic-float.listening{border-color:#ff4444;background:radial-gradient(circle at 36% 28%,#ff8888,#aa0000);box-shadow:0 4px 24px rgba(255,30,30,.7);animation:micpulse .5s infinite alternate;}
@keyframes micpulse{to{box-shadow:0 0 22px rgba(255,50,50,.9);}}
#score-bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 36% 28%,#ff88d8,#e0157a 55%,#940050);border:4px solid rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;line-height:1;pointer-events:none;box-shadow:0 6px 30px rgba(220,10,110,.65),inset 0 3px 0 rgba(255,255,255,.45);}
#timer-bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 36% 28%,#ffe066,#e07800 55%,#a04a00);border:4px solid rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;line-height:1;pointer-events:none;box-shadow:0 6px 30px rgba(180,90,0,.65),inset 0 3px 0 rgba(255,255,255,.45);}
#timer-bubble.urgent{animation:urg .4s infinite alternate;}
@keyframes urg{to{transform:scale(1.1);}}
#top-bar{position:absolute;top:0;left:0;right:0;display:flex;align-items:flex-start;justify-content:space-between;z-index:30;pointer-events:none;}
#top-left{display:flex;align-items:center;gap:10px;pointer-events:all;}
#top-right{display:flex;align-items:center;gap:10px;pointer-events:all;}
.icon-btn{border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;line-height:1;user-select:none;-webkit-user-select:none;flex-shrink:0;font-family:'Nunito',sans-serif;font-weight:900;color:#fff;}
.icon-btn.clickable{cursor:pointer;transition:transform .12s,filter .12s;}
.icon-btn.clickable:hover{filter:brightness(1.2);}
.icon-btn.clickable:active{transform:scale(.87);}
.icon-btn.deco{cursor:default;pointer-events:none;}
.ibtn-pause{background:radial-gradient(circle at 38% 32%,#7ab4ff,#3a6fd4 60%,#1a4aaa);box-shadow:0 3px 14px rgba(50,100,220,.5),inset 0 2px 0 rgba(255,255,255,.35);}
.ibtn-wrong{background:radial-gradient(circle at 38% 32%,#ff6666,#cc1818 60%,#960000);}
.ibtn-right{background:radial-gradient(circle at 38% 32%,#66ee88,#1aaa44 60%,#008830);}
.ibtn-reset{background:radial-gradient(circle at 38% 32%,#ffe066,#cc8800 60%,#996400);}
.ibtn-cam{background:radial-gradient(circle at 38% 32%,#aabbdd,#556688 60%,#334455);box-shadow:0 3px 14px rgba(60,80,120,.5);}
.ibtn-cam.on{background:radial-gradient(circle at 38% 32%,#55eebb,#118855 60%,#006633);}
.ibtn-fs{background:radial-gradient(circle at 38% 32%,#aabbdd,#556688 60%,#334455);}
#q-panel{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:20;text-align:center;}
#q-panel.active{pointer-events:all;}
#q-tipo{font-weight:800;letter-spacing:1.5px;color:#88ccff;text-transform:uppercase;}
#q-big-letter{font-weight:900;color:#fff;line-height:1;text-shadow:0 2px 20px rgba(80,160,255,.7);}
#q-divider{width:60%;height:2px;background:linear-gradient(90deg,transparent,rgba(100,160,255,.6),transparent);}
#q-text{color:#ddeeff;line-height:1.4;font-weight:700;}
#q-feedback{font-weight:800;letter-spacing:.3px;min-height:1em;color:transparent;transition:color .2s;}
#q-feedback.ok{color:#44ffaa;}
#ans-wrap{width:94%;display:flex;justify-content:center;align-items:center;}
#ans-inp{flex:1;background:rgba(10,30,100,.88);border:2px solid rgba(80,150,255,.65);border-radius:30px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;outline:none;text-align:center;}
#ans-inp:focus{border-color:#88ccff;}
#ans-inp.ok{border-color:#44ffaa;background:rgba(0,55,28,.88);}
#ans-inp.fail{border-color:#ff5555;background:rgba(55,0,0,.88);}
/* Old inline mic kept hidden — replaced by #mic-float */
#mic-btn{display:none;}
#action-row{width:90%;display:flex;gap:0;overflow:hidden;}
#btn-ok{flex:1;background:linear-gradient(160deg,#1a66ee,#44aaff);color:#fff;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;display:flex;align-items:center;justify-content:center;transition:filter .15s;border-right:2px solid rgba(0,0,0,.25);}
#btn-ok:hover{filter:brightness(1.12);}
#btn-ok:active{filter:brightness(.85);}
#btn-pasa{flex:2;background:linear-gradient(160deg,#886600,#ddaa00);color:#fff;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:900;display:flex;align-items:center;justify-content:center;transition:filter .15s;}
#btn-pasa:hover{filter:brightness(1.12);}
#btn-pasa:active{filter:brightness(.85);}
#player-name-tag{position:absolute;left:50%;transform:translateX(-50%);background:rgba(0,0,40,.82);border:1.5px solid rgba(100,160,255,.45);border-radius:30px;color:#ffcc44;font-weight:900;letter-spacing:2px;text-transform:uppercase;pointer-events:none;z-index:25;white-space:nowrap;display:none;}
#lb-panel{position:absolute;right:0;bottom:0;background:rgba(0,0,30,.92);border-top:1px solid rgba(100,160,255,.3);border-left:1px solid rgba(100,160,255,.3);border-radius:12px 0 0 0;z-index:22;pointer-events:none;display:none;}
#lb-title-el{color:#88ccff;font-weight:800;letter-spacing:2px;text-align:center;border-bottom:1px solid rgba(100,160,255,.2);padding-bottom:3px;margin-bottom:4px;}
#lb-list{display:flex;flex-direction:column;gap:2px;}
#pause-overlay{position:absolute;inset:0;z-index:50;background:rgba(0,0,20,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;pointer-events:all;}
#pause-msg{font-weight:900;color:#fff;letter-spacing:1px;text-align:center;line-height:1.5;white-space:pre-line;}
#btn-resume{background:linear-gradient(135deg,#1a66ee,#44aaff);color:#fff;border:none;border-radius:40px;font-family:'Nunito',sans-serif;font-weight:900;letter-spacing:1px;cursor:pointer;box-shadow:0 6px 28px rgba(68,170,255,.45);}
#timer-config{position:absolute;z-index:55;background:rgba(0,5,40,.97);border:2px solid rgba(100,160,255,.5);border-radius:18px;display:none;flex-direction:column;align-items:center;pointer-events:all;}
#timer-config h3{color:#fff;font-weight:900;letter-spacing:1px;}
#timer-config p{color:#88aacc;text-align:center;line-height:1.5;}
#timer-slider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;background:#1a3a88;outline:none;}
#timer-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#1a66ee,#44aaff);border:2px solid #fff;cursor:pointer;}
#timer-val{font-weight:900;color:#44aaff;}
.btn-cfg-ok{background:linear-gradient(135deg,#1144cc,#44aaff);color:#fff;border:none;border-radius:30px;font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;}
#confirm-overlay{position:absolute;inset:0;z-index:60;background:rgba(0,0,20,.93);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:all;}
#confirm-msg{font-weight:800;color:#fff;text-align:center;}
#confirm-sub{color:#aabbcc;text-align:center;}
.confirm-row{display:flex;gap:14px;}
.btn-yes{background:linear-gradient(135deg,#cc2222,#ff4444);color:#fff;border:none;border-radius:30px;font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;}
.btn-no{background:rgba(80,120,200,.3);border:2px solid rgba(100,160,255,.5);color:#aaddff;border-radius:30px;font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;}
#start-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.84);pointer-events:all;z-index:40;}
.ss-eye{font-weight:800;letter-spacing:5px;color:#4466aa;}
.ss-title{font-weight:900;color:#fff;letter-spacing:3px;text-shadow:0 0 30px rgba(80,160,255,.5);}
#name-inp{background:rgba(10,30,100,.9);border:2px solid rgba(80,160,255,.6);border-radius:40px;color:#fff;font-family:'Nunito',sans-serif;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:2px;outline:none;}
#name-inp::placeholder{color:#334466;}
.btn-big{background:linear-gradient(135deg,#1144cc,#44aaff);color:#fff;border-radius:40px;border:none;font-family:'Nunito',sans-serif;font-weight:900;letter-spacing:1px;box-shadow:0 6px 28px rgba(68,170,255,.45);cursor:pointer;transition:opacity .15s,transform .1s;}
.btn-big:hover{opacity:.9;}
.btn-big:active{transform:scale(.96);}
#timer-start-btn{background:radial-gradient(circle at 36% 28%,#ffe066,#e07800 55%,#a04a00);border:3px solid rgba(255,255,255,.8);border-radius:50px;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(180,90,0,.5);letter-spacing:1px;}
#timer-start-btn:hover:not(:disabled){filter:brightness(1.1);}
#timer-start-btn:disabled{opacity:.4;cursor:not-allowed;}
#end-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,20,.94);pointer-events:all;z-index:40;padding:16px;}
#end-name{color:#ffcc44;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
#end-num{font-weight:900;color:#44aaff;line-height:1;text-shadow:0 0 40px rgba(68,170,255,.5);}
#end-msg{font-weight:900;color:#fff;letter-spacing:2px;}
#end-sub{color:#7799bb;}
#end-lb-wrap{width:100%;}
#end-lb-title{color:#88ccff;font-weight:800;letter-spacing:2px;text-align:center;}
#end-lb-list{display:flex;flex-direction:column;align-items:stretch;width:100%;}
</style>
</head>
<body>
<div id="stage">
  <video id="vid" autoplay playsinline muted></video>
  <div id="overlay">
    <svg id="rosco-svg"></svg>
    <div id="score-bubble"><span id="sc-num" style="font-weight:900">0</span><span style="font-weight:800;opacity:.9;letter-spacing:.5px;margin-top:2px">BIEN</span></div>
    <div id="timer-bubble"><span id="sc-timer" style="font-weight:900">240</span><span style="font-weight:800;opacity:.9;letter-spacing:.5px;margin-top:2px">SEG</span></div>
    <div id="top-bar">
      <div id="top-left">
        <button class="icon-btn ibtn-pause clickable" id="btn-pause" onclick="togglePause()">&#9646;&#9646;</button>
        <div class="icon-btn ibtn-wrong deco">&#x2715;</div>
        <div class="icon-btn ibtn-right deco">&#x2713;</div>
        <div class="icon-btn ibtn-reset deco">&#x21BB;</div>
      </div>
      <div id="top-right">
        <button class="icon-btn ibtn-cam clickable" id="cam-btn" onclick="toggleCam()">&#128247;</button>
        <button class="icon-btn ibtn-fs  clickable" id="fs-btn"  onclick="toggleFS()">&#9974;</button>
      </div>
    </div>
    <div id="q-panel" style="display:none">
      <div id="q-tipo">EMPIEZA POR A</div>
      <div id="q-big-letter">A</div>
      <div id="q-divider"></div>
      <div id="q-text">&#8211;</div>
      <div id="q-feedback"></div>
      <div id="ans-wrap">
        <input id="ans-inp" type="text" placeholder="Tu respuesta..." autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button id="mic-btn">&#127908;</button>
      </div>
      <div id="action-row">
        <button id="btn-ok" onclick="submitAns()">OK</button>
        <button id="btn-pasa" onclick="pasapalabra()">PASAPALABRA</button>
      </div>
    </div>
    <div id="player-name-tag"></div>
    <!-- Floating mic button — bottom right, thumb zone -->
    <div id="mic-float">&#127908;</div>
    <div id="lb-panel"><div id="lb-title-el">TABLA</div><div id="lb-list"></div></div>
    <div id="pause-overlay"><div id="pause-msg"></div><button id="btn-resume" onclick="resumeGame()">&#9654; REANUDAR</button></div>
    <div id="timer-config">
      <h3 id="tc-title">TIEMPO DE JUEGO</h3>
      <p id="tc-desc">Solo el primer jugador puede configurarlo.</p>
      <div id="timer-val">240 seg</div>
      <input type="range" id="timer-slider" min="120" max="300" step="10" value="240" oninput="updateTimerVal(this.value)"/>
      <div style="display:flex;justify-content:space-between;width:100%;"><span style="color:#668;font-weight:700">120s</span><span style="color:#668;font-weight:700">300s</span></div>
      <button class="btn-cfg-ok" id="tc-ok" onclick="closeTimerConfig()">LISTO</button>
    </div>
    <div id="confirm-overlay">
      <div id="confirm-msg">&#191;Reiniciar partida completa?</div>
      <div id="confirm-sub">Se eliminan todos los puntajes y vuelve al inicio.</div>
      <div class="confirm-row"><button class="btn-yes" onclick="confirmReset()">S&#205;, REINICIAR</button><button class="btn-no" onclick="cancelConfirm()">CANCELAR</button></div>
    </div>
    <div id="start-screen">
      <p class="ss-eye" id="ss-eye">EL ROSCO</p>
      <p class="ss-title" id="ss-ttl">PASAPALABRA</p>
      <div id="timer-start-row" style="display:flex;align-items:center;justify-content:center;">
        <span id="timer-start-lbl" style="color:#88aacc;font-weight:700;letter-spacing:1px;">&#9201; TIEMPO:</span>
        <button id="timer-start-btn" onclick="openTimerConfig()"><span id="timer-start-val">240 SEG</span></button>
      </div>
      <input id="name-inp" type="text" placeholder="TU NOMBRE" maxlength="14" autocomplete="off"/>
      <button class="btn-big" id="play-btn" onclick="beginGame()">JUGAR</button>
    </div>
    <div id="end-screen">
      <div id="end-name"></div>
      <div id="end-num">0</div>
      <div id="end-msg">CORRECTAS</div>
      <div id="end-sub"></div>
      <div id="end-lb-wrap"><div id="end-lb-title">TOP 10 &#8212; ESTA SESI&#211;N</div><div id="end-lb-list"></div></div>
      <button class="btn-big" id="again-btn" onclick="newPlayer()">SIGUIENTE JUGADOR</button>
    </div>
  </div>
</div>

function layout(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const mobile=vh>vw; L.mobile=mobile;
  let W,H,sx,sy;
  if(mobile){if(vw/vh<9/16){W=vw;H=W*16/9;}else{H=vh;W=H*9/16;}}
  else{if(vw/vh>16/9){H=vh;W=H*16/9;}else{W=vw;H=W*9/16;}}
  sx=(vw-W)/2;sy=(vh-H)/2;
  const st=document.getElementById('stage');
  Object.assign(st.style,{left:sx+'px',top:sy+'px',width:W+'px',height:H+'px'});
  const sc=H/900;
  const usableTop=H*0.10,usableBot=H*0.92;
  const cx=W*0.5,cy=(usableTop+usableBot)/2;
  const cr_want=mobile?H*0.041:H*0.047;
  const r_min=(LETTERS.length*2*cr_want*1.22)/(2*Math.PI);
  const r_max=Math.min(W*0.44,(usableBot-usableTop)*0.50);
  const r=Math.min(r_max,Math.max(r_min,mobile?H*0.30:H*0.33));
  const cr=Math.min(cr_want,(r*2*Math.PI)/(LETTERS.length*2*1.22));
  const innerR=r-cr*2.6;
  const bub=mobile?H*0.090:H*0.112;
  Object.assign(L,{W,H,sc,cx,cy,r,cr,innerR,bub,mobile});

  // BUBBLES: on mobile place them centered below the rosco, not flanking it
  // to avoid overlapping letters. On desktop keep flanking.
  if(mobile){
    // Place below rosco, side by side, centered
    const bubM=Math.min(H*0.080, W*0.18);
    const gap=W*0.08;
    const bubY=cy+r+cr*0.3;
    setRound('score-bubble',bubM,cx-bubM-gap/2,bubY);
    setRound('timer-bubble',bubM,cx+gap/2,bubY);
    const bfsM=bubM*0.36;
    document.getElementById('sc-num').style.fontSize=bfsM+'px';
    document.getElementById('sc-timer').style.fontSize=bfsM+'px';
    document.querySelectorAll('#score-bubble span,#timer-bubble span').forEach((s,i)=>{s.style.fontSize=(i%2===0?bfsM:bubM*0.13)+'px';});
    Object.assign(L,{bub:bubM});
  } else {
    setRound('score-bubble',bub,W*0.016,cy-bub/2);
    setRound('timer-bubble',bub,W-W*0.016-bub,cy-bub/2);
    const bfs=bub*0.36;
    document.getElementById('sc-num').style.fontSize=bfs+'px';
    document.getElementById('sc-timer').style.fontSize=bfs+'px';
    document.querySelectorAll('#score-bubble span,#timer-bubble span').forEach((s,i)=>{s.style.fontSize=(i%2===0?bfs:bub*0.13)+'px';});
  }

  const inset=Math.round(36*sc),ibSize=mobile?H*0.052:H*0.060;
  document.getElementById('top-bar').style.padding=`${inset}px ${inset}px 0 ${inset}px`;
  ['top-left','top-right'].forEach(id=>document.getElementById(id).style.gap=sc*9+'px');
  document.querySelectorAll('.icon-btn').forEach(b=>{b.style.width=b.style.height=ibSize+'px';b.style.fontSize=ibSize*0.42+'px';});

  // On iOS, fullscreen API not supported — show/hide fs button accordingly
  const fsBtn=document.getElementById('fs-btn');
  const iOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(iOS){fsBtn.style.display='none';}else{fsBtn.style.display='flex';}

  const qd=innerR*1.84;
  const qp=document.getElementById('q-panel');
  Object.assign(qp.style,{width:qd+'px',height:qd+'px',left:(cx-qd/2)+'px',top:(cy-qd/2)+'px',gap:sc*2.5+'px',padding:`${innerR*0.07}px ${innerR*0.11}px`});
  document.getElementById('q-tipo').style.fontSize=Math.min(innerR*0.155,sc*13)+'px';
  document.getElementById('q-big-letter').style.fontSize=Math.min(innerR*0.62,sc*60)+'px';
  document.getElementById('q-text').style.fontSize=Math.min(innerR*0.175,sc*16.5)+'px';
  document.getElementById('q-feedback').style.fontSize=sc*12+'px';
  document.getElementById('q-divider').style.margin=`${sc*2}px 0`;
  document.getElementById('ans-inp').style.fontSize=sc*14+'px';
  document.getElementById('ans-inp').style.padding=`${sc*7}px ${sc*11}px`;

  // Floating mic button — bottom right, thumb zone
  const micFloatSize=Math.min(W*0.16,H*0.09,sc*68);
  const micInset=Math.round(sc*18);
  const mf=document.getElementById('mic-float');
  mf.style.width=mf.style.height=micFloatSize+'px';
  mf.style.fontSize=micFloatSize*0.42+'px';
  mf.style.right=micInset+'px';
  mf.style.bottom=micInset+'px';

  const btnH=Math.min(innerR*0.26,sc*30);
  document.getElementById('action-row').style.marginTop=sc*3+'px';
  document.getElementById('action-row').style.borderRadius=btnH*0.5+'px';
  document.getElementById('btn-ok').style.cssText+=`;font-size:${sc*13.5}px;height:${btnH}px;`;
  document.getElementById('btn-pasa').style.cssText+=`;font-size:${sc*13.5}px;height:${btnH}px;`;
  // Player name — preserve visibility on fullscreen toggle
  const pnt=document.getElementById('player-name-tag');
  const pntVis=pnt.style.display==='block';
  const nameInsideY=cy+innerR*0.72;
  pnt.style.cssText=`position:absolute;left:50%;transform:translateX(-50%);top:${nameInsideY}px;font-size:${Math.min(innerR*0.17,sc*15)}px;padding:${sc*4}px ${sc*16}px;background:rgba(0,0,40,.82);border:1.5px solid rgba(100,160,255,.45);border-radius:30px;color:#ffcc44;font-weight:900;letter-spacing:2px;text-transform:uppercase;pointer-events:none;z-index:25;white-space:nowrap;display:${pntVis?'block':'none'};`;
  const lbW=mobile?W*0.28:W*0.20;
  const lp=document.getElementById('lb-panel');
  lp.style.width=lbW+'px';lp.style.padding=`${sc*5}px ${sc*7}px`;
  document.getElementById('lb-title-el').style.fontSize=sc*9+'px';
  const tcVis=document.getElementById('timer-config').style.display==='flex';
  const tcW=Math.min(W*0.50,300*sc);
  const tc=document.getElementById('timer-config');
  tc.style.cssText=`position:absolute;z-index:55;width:${tcW}px;left:${(W-tcW)/2}px;top:${H*0.28}px;background:rgba(0,5,40,.97);border:2px solid rgba(100,160,255,.5);border-radius:${sc*16}px;padding:${sc*20}px ${sc*22}px;display:${tcVis?'flex':'none'};flex-direction:column;align-items:center;gap:${sc*12}px;pointer-events:all;`;
  document.getElementById('tc-title').style.fontSize=sc*18+'px';
  document.getElementById('tc-desc').style.fontSize=sc*12+'px';
  document.getElementById('timer-val').style.fontSize=sc*28+'px';
  document.getElementById('tc-ok').style.cssText+=`;font-size:${sc*15}px;padding:${sc*9}px ${sc*28}px;`;
  document.getElementById('pause-msg').style.fontSize=sc*21+'px';
  document.getElementById('btn-resume').style.cssText+=`;font-size:${sc*17}px;padding:${sc*11}px ${sc*34}px;`;
  document.getElementById('confirm-msg').style.fontSize=sc*17+'px';
  document.getElementById('confirm-sub').style.fontSize=sc*13+'px';
  document.querySelectorAll('.btn-yes,.btn-no').forEach(b=>{b.style.fontSize=sc*14+'px';b.style.padding=`${sc*9}px ${sc*20}px`;});
  document.getElementById('start-screen').style.gap=sc*14+'px';
  document.getElementById('ss-eye').style.fontSize=sc*12+'px';
  document.getElementById('ss-ttl').style.fontSize=sc*(mobile?34:44)+'px';
  const ni=document.getElementById('name-inp');
  ni.style.fontSize=sc*17+'px';ni.style.padding=`${sc*10}px ${sc*26}px`;ni.style.width=(mobile?W*0.72:W*0.28)+'px';
  document.getElementById('play-btn').style.cssText+=`;font-size:${sc*17}px;padding:${sc*12}px ${sc*40}px;margin-top:${sc*18}px;`;
  document.getElementById('timer-start-lbl').style.fontSize=sc*14+'px';
  document.getElementById('timer-start-btn').style.fontSize=sc*15+'px';
  document.getElementById('timer-start-btn').style.padding=`${sc*8}px ${sc*22}px`;
  document.getElementById('timer-start-row').style.gap=sc*10+'px';
  document.getElementById('timer-start-val').textContent=TOTAL_TIME+' SEG';
  document.getElementById('end-screen').style.gap=sc*7+'px';
  document.getElementById('end-num').style.fontSize=sc*64+'px';
  document.getElementById('end-msg').style.fontSize=sc*18+'px';
  document.getElementById('end-sub').style.fontSize=sc*12+'px';
  document.getElementById('end-name').style.fontSize=sc*14+'px';
  document.getElementById('end-lb-title').style.fontSize=sc*11+'px';
  document.getElementById('end-lb-title').style.marginBottom=sc*8+'px';
  document.getElementById('end-lb-wrap').style.cssText=`max-width:${Math.min(W*0.60,440)}px;width:100%;`;
  // ~1cm gap between last player and button
  const ab=document.getElementById('again-btn');
  ab.style.fontSize=sc*15+'px';ab.style.padding=`${sc*10}px ${sc*28}px`;ab.style.marginTop=sc*22+'px';
  drawRosco();
}

function setRound(id,size,left,top){const el=document.getElementById(id);el.style.width=el.style.height=size+'px';el.style.left=left+'px';el.style.top=top+'px';}

function getCol(l,cur){if(l===cur)return blinkState?COL.blink_l:COL.gold;return COL[S.letters[l]||'pending'];}
function drawRosco(){
  const svg=document.getElementById('rosco-svg');
  const{W,H,cx,cy,r,cr}=L;if(!W)return;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.innerHTML='';
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');svg.appendChild(defs);
  const n=LETTERS.length,cur=S.active?getCur():null;
  LETTERS.forEach((l,i)=>{
    const angle=(i/n)*2*Math.PI-Math.PI/2;
    const x=cx+r*Math.cos(angle),y=cy+r*Math.sin(angle);
    const isCur=l===cur,rad=isCur?cr*1.28:cr,col=getCol(l,cur);
    const gid='g'+l+(isCur?(blinkState?'bl':'au'):(S.letters[l]||'p'));
    if(!defs.querySelector('#'+gid)){
      const grad=document.createElementNS('http://www.w3.org/2000/svg','radialGradient');
      grad.setAttribute('id',gid);grad.setAttribute('cx','36%');grad.setAttribute('cy','28%');grad.setAttribute('r','65%');
      const s1=document.createElementNS('http://www.w3.org/2000/svg','stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color',col.shine);
      const s2=document.createElementNS('http://www.w3.org/2000/svg','stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color',col.fill);
      grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);
    }
    if(isCur){const glow=document.createElementNS('http://www.w3.org/2000/svg','circle');glow.setAttribute('cx',x);glow.setAttribute('cy',y);glow.setAttribute('r',rad*1.55);glow.setAttribute('fill','rgba(255,210,30,0.20)');svg.appendChild(glow);}
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',rad);c.setAttribute('fill','url(#'+gid+')');c.setAttribute('stroke',col.stroke);c.setAttribute('stroke-width',isCur?'3.5':'2.5');
    g.appendChild(c);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',x);t.setAttribute('y',y+0.5);t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
    t.setAttribute('fill','#fff');t.setAttribute('font-size',(isCur?rad*0.85:rad*0.78).toFixed(1));
    t.setAttribute('font-weight','900');t.setAttribute('font-family','Nunito,sans-serif');
    t.setAttribute('paint-order','stroke');t.setAttribute('stroke','rgba(0,0,0,.28)');t.setAttribute('stroke-width','1.5');
    t.textContent=l;g.appendChild(t);svg.appendChild(g);
  });
}

function startBlink(){if(blinkInterval)clearInterval(blinkInterval);blinkInterval=setInterval(()=>{blinkState=!blinkState;drawRosco();},420);}
function stopBlink(){if(blinkInterval)clearInterval(blinkInterval);blinkInterval=null;blinkState=false;}

async function toggleCam(){camOn?stopCam():await startCam();}
async function startCam(){
  const btn=document.getElementById('cam-btn');
  try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});document.getElementById('vid').srcObject=camStream;document.getElementById('vid').style.display='block';btn.className='icon-btn ibtn-cam clickable on';btn.innerHTML='&#127909;';camOn=true;}
  catch(e){btn.innerHTML='&#128683;';}
}
function stopCam(){if(camStream)camStream.getTracks().forEach(t=>t.stop());camStream=null;document.getElementById('vid').style.display='none';const btn=document.getElementById('cam-btn');btn.className='icon-btn ibtn-cam clickable';btn.innerHTML='&#128247;';camOn=false;}
function toggleFS(){const inFS=!!(document.fullscreenElement||document.webkitFullscreenElement);if(!inFS){const el=document.documentElement;(el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);}else{(document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);}}
document.addEventListener('fullscreenchange',layout);document.addEventListener('webkitfullscreenchange',layout);

function openTimerConfig(){
  if(timerLocked){alert('El tiempo fue configurado por el primer jugador.\nPresioná ESC para reiniciar todo si querés cambiarlo.');return;}
  document.getElementById('timer-slider').value=TOTAL_TIME;
  document.getElementById('timer-val').textContent=TOTAL_TIME+' seg';
  document.getElementById('timer-config').style.display='flex';
}
function updateTimerVal(v){document.getElementById('timer-val').textContent=v+' seg';}
function closeTimerConfig(){
  TOTAL_TIME=parseInt(document.getElementById('timer-slider').value);
  document.getElementById('sc-timer').textContent=TOTAL_TIME;
  document.getElementById('timer-start-val').textContent=TOTAL_TIME+' SEG';
  document.getElementById('timer-config').style.display='none';
}
function lockTimer(){
  timerLocked=true;
  document.getElementById('timer-start-btn').disabled=true;
}

function togglePause(){if(!S.active)return;if(paused)resumeGame();else showPause('\u23F8  JUEGO PAUSADO',null);}
function showPause(msg,cb){paused=true;stopBlink();stopMicNow();afterResume=cb;document.getElementById('pause-msg').textContent=msg||'PAUSADO';document.getElementById('pause-overlay').style.display='flex';}
function resumeGame(){paused=false;document.getElementById('pause-overlay').style.display='none';startBlink();if(afterResume){const fn=afterResume;afterResume=null;setTimeout(fn,80);}else loadQ();}
function startTimer(){
  if(S.timer)clearInterval(S.timer);
  S.timer=setInterval(()=>{
    if(paused)return;
    S.timeLeft--;
    document.getElementById('sc-timer').textContent=S.timeLeft;
    document.getElementById('timer-bubble').className=S.timeLeft<=30?'urgent':'';
    if(S.timeLeft<=0)endGame();
  },1000);
}

function initRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return null;
  const rec=new SR();rec.lang='es-AR';rec.continuous=false;rec.interimResults=false;rec.maxAlternatives=1;
  rec.onresult=e=>{
    // Fill input but do NOT auto-submit — user reviews and presses OK or Enter
    const word=e.results[0][0].transcript.trim().toUpperCase().replace(/\s+/g,'');
    document.getElementById('ans-inp').value=word;
    document.getElementById('ans-inp').focus();
    stopMicNow();
  };
  rec.onend=()=>{if(micOn)stopMicNow();};rec.onerror=()=>stopMicNow();
  return rec;
}
function setMicUI(on){
  const mf=document.getElementById('mic-float');
  const mb=document.getElementById('mic-btn');
  const listeningClass=S.active?'active-game listening':'listening';
  const idleClass=S.active?'active-game':'';
  mf.className=on?listeningClass:idleClass;
  mf.innerHTML=on?'&#128308;':'&#127908;';
  mb.className=on?'listening':'';
  mb.innerHTML=on?'&#128308;':'&#127908;';
}
async function ensureMicPermission(){
  if(micPermitted)return true;
  if(window.location.protocol==='file:'){alert('El mic requiere HTTPS.\nUsá VS Code Live Server o: python3 -m http.server 8080');return false;}
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true,video:false});s.getTracks().forEach(t=>t.stop());micPermitted=true;return true;}
  catch(e){alert('Sin permiso de micrófono. Habilitalo en Ajustes > Safari/Chrome > Micrófono.');return false;}
}
async function startMicNow(){
  if(!S.active||paused)return;
  if(!await ensureMicPermission())return;
  if(!recognition)recognition=initRec();
  if(!recognition){alert('Reconocimiento de voz no disponible en este navegador.\nUsá Chrome (Android) o Safari (iOS).');return;}
  if(micOn)return;
  try{recognition.start();}catch(e){return;}
  micOn=true;setMicUI(true);
}
function stopMicNow(){if(!micOn)return;if(recognition)try{recognition.stop();}catch(e){}micOn=false;setMicUI(false);}

// Floating mic (main, thumb-reachable)
const micFloatEl=document.getElementById('mic-float');
micFloatEl.addEventListener('mousedown',e=>{e.preventDefault();startMicNow();});
micFloatEl.addEventListener('mouseup',  e=>{e.preventDefault();stopMicNow();});
micFloatEl.addEventListener('mouseleave',e=>{if(micOn)stopMicNow();});
micFloatEl.addEventListener('touchstart',e=>{e.preventDefault();startMicNow();},{passive:false});
micFloatEl.addEventListener('touchend',  e=>{e.preventDefault();stopMicNow();},{passive:false});
micFloatEl.addEventListener('touchcancel',()=>{if(micOn)stopMicNow();});

// Inline mic (hidden but events kept for keyboard shortcut compat)
const micBtnEl=document.getElementById('mic-btn');
micBtnEl.addEventListener('mousedown',e=>{e.preventDefault();startMicNow();});
micBtnEl.addEventListener('mouseup',  e=>{e.preventDefault();stopMicNow();});
micBtnEl.addEventListener('touchstart',e=>{e.preventDefault();startMicNow();},{passive:false});
micBtnEl.addEventListener('touchend',  e=>{e.preventDefault();stopMicNow();},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target!==document.getElementById('ans-inp')&&S.active&&!paused){e.preventDefault();if(!micOn)startMicNow();return;}
  if(e.key==='Escape'){if(document.getElementById('timer-config').style.display==='flex'){closeTimerConfig();return;}if(document.getElementById('confirm-overlay').style.display==='flex'){cancelConfirm();return;}askConfirmReset();return;}
  if(e.key==='Enter'){if(document.getElementById('start-screen').style.display!=='none'){beginGame();return;}if(document.getElementById('confirm-overlay').style.display==='flex'){confirmReset();return;}if(paused){resumeGame();return;}if(S.active)submitAns();return;}
  if(S.active&&!paused&&e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&e.code!=='Space')document.getElementById('ans-inp').focus();
});
document.addEventListener('keyup',e=>{if(e.code==='Space'&&micOn){e.preventDefault();stopMicNow();}});

function askConfirmReset(){document.getElementById('confirm-overlay').style.display='flex';}
function cancelConfirm(){document.getElementById('confirm-overlay').style.display='none';}
function confirmReset(){document.getElementById('confirm-overlay').style.display='none';hardReset();}
function hardReset(){
  if(S.timer)clearInterval(S.timer);
  stopBlink();stopMicNow();S.active=false;paused=false;timerLocked=false;
  leaderboard=[];usedRoscoIdx=[];
  ['q-panel','lb-panel','player-name-tag','pause-overlay','end-screen'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  document.getElementById('mic-float').className=''; // hide
  document.getElementById('timer-start-btn').disabled=false;
  const ss=document.getElementById('start-screen');ss.style.display='flex';ss.style.flexDirection='column';
  document.getElementById('name-inp').value='';
  initState(false);drawRosco();
}

function fmtTime(s){return s<60?s+'s':Math.floor(s/60)+'m'+String(s%60).padStart(2,'0')+'s';}

function saveScore(){
  const name=S.name.toUpperCase();
  const idx=leaderboard.findIndex(e=>e.name===name);
  const entry={name,correct:S.correct,wrong:S.wrong,time:Math.round(TOTAL_TIME-S.timeLeft)};
  if(idx!==-1)leaderboard[idx]=entry;else leaderboard.push(entry);
  leaderboard.sort((a,b)=>b.correct-a.correct||(a.wrong-b.wrong)||(a.time-b.time));
  if(leaderboard.length>10)leaderboard=leaderboard.slice(0,10);
}

function buildLBRows(container,sc,compact){
  container.innerHTML='';
  if(!leaderboard.length)return;
  const medals=['\u{1F947}','\u{1F948}','\u{1F949}'];
  const me=S.name.toUpperCase();
  leaderboard.forEach((e,i)=>{
    const isMe=e.name===me;
    const row=document.createElement('div');
    row.style.cssText=`display:flex;align-items:center;gap:${sc*(compact?3:5)}px;width:100%;padding:${sc*(compact?2:4)}px ${sc*5}px;border-radius:${sc*7}px;background:${isMe?'rgba(255,200,50,.12)':'rgba(255,255,255,.04)'};margin-bottom:${sc*(compact?1:3)}px;`;
    const posEl=document.createElement('span');
    posEl.style.cssText=`font-size:${sc*(i<3?compact?13:17:compact?10:13)}px;font-weight:900;flex-shrink:0;width:${sc*(compact?18:24)}px;text-align:center;color:${i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#6688aa'};`;
    posEl.textContent=i<3?String.fromCodePoint([0x1F947,0x1F948,0x1F949][i]):(i+1);
    const nmEl=document.createElement('span');
    nmEl.style.cssText=`font-size:${sc*(compact?10:14)}px;font-weight:800;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-transform:uppercase;color:${isMe?'#ffcc44':'#ddeeff'};`;
    nmEl.textContent=e.name;
    const scEl=document.createElement('span');
    scEl.style.cssText=`font-size:${sc*(compact?12:15)}px;font-weight:900;color:#44aaff;flex-shrink:0;min-width:${sc*18}px;text-align:right;`;
    scEl.textContent=e.correct;
    const tmEl=document.createElement('span');
    tmEl.style.cssText=`font-size:${sc*(compact?9:11)}px;font-weight:700;color:#7799bb;flex-shrink:0;margin-left:${sc*4}px;min-width:${sc*22}px;text-align:right;`;
    tmEl.textContent=fmtTime(e.time);
    row.appendChild(posEl);row.appendChild(nmEl);row.appendChild(scEl);row.appendChild(tmEl);
    container.appendChild(row);
  });
}
function renderInGameLB(){if(!leaderboard.length){document.getElementById('lb-panel').style.display='none';return;}document.getElementById('lb-panel').style.display='block';buildLBRows(document.getElementById('lb-list'),L.sc,true);}
function renderEndLB(){buildLBRows(document.getElementById('end-lb-list'),L.sc,false);}

function pickRosco(){
  let avail=[];for(let i=0;i<ALL_ROSCOS.length;i++)if(!usedRoscoIdx.includes(i))avail.push(i);
  if(!avail.length){usedRoscoIdx=[];avail=[...Array(ALL_ROSCOS.length).keys()];}
  const idx=avail[Math.floor(Math.random()*avail.length)];usedRoscoIdx.push(idx);return ALL_ROSCOS[idx];
}
function getCur(){return S.pending[S.curIdx%Math.max(S.pending.length,1)];}
function initState(keepRosco){
  S.letters={};LETTERS.forEach(l=>{S.letters[l]='pending';});
  S.pending=[...LETTERS];S.curIdx=0;S.correct=0;S.wrong=0;S.timeLeft=TOTAL_TIME;S.active=false;if(!keepRosco)S.rosco=null;
}
function beginGame(){
  const ni=document.getElementById('name-inp');
  S.name=(ni.value.trim().toUpperCase()||'JUGADOR').substring(0,14);
  const rosco=pickRosco();
  document.getElementById('start-screen').style.display='none';
  initState(false);S.rosco=rosco;
  lockTimer();startGame();
}
function startGame(){
  S.active=true;paused=false;
  document.getElementById('sc-num').textContent=0;
  document.getElementById('sc-timer').textContent=TOTAL_TIME;
  document.getElementById('timer-bubble').className='';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('q-panel').style.display='flex';document.getElementById('q-panel').className='active';
  document.getElementById('mic-float').className='active-game';
  const pnt=document.getElementById('player-name-tag');pnt.textContent=S.name;pnt.style.display='block';
  startBlink();drawRosco();loadQ();startTimer();
}
function getQ(l){if(!S.rosco)return null;return S.rosco[LETTERS.indexOf(l)]||null;}
function loadQ(){
  const l=getCur();if(!l){endGame();return;}
  document.getElementById('q-big-letter').textContent=l;
  document.getElementById('ans-inp').value='';document.getElementById('ans-inp').className='';
  document.getElementById('q-feedback').textContent='';document.getElementById('q-feedback').className='';
  const q=getQ(l);
  if(q){document.getElementById('q-text').textContent=q.p;document.getElementById('q-tipo').textContent=q.t==='e'?'EMPIEZA POR '+l:'CONTIENE LA '+l;}
  document.getElementById('ans-inp').focus();
}
function norm(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim().replace(/\s+/g,'');}
function submitAns(){
  if(!S.active||paused)return;
  const inp=document.getElementById('ans-inp');const raw=inp.value.trim().toUpperCase();if(!raw)return;
  if(norm(raw)==='PASAPALABRA'){inp.value='';pasapalabra();return;}
  const l=getCur();const q=getQ(l);if(!q)return;
  const ok=norm(raw)===norm(q.r);
  stopMicNow();
  if(ok){
    S.letters[l]='correct';S.correct++;document.getElementById('sc-num').textContent=S.correct;
    const fb=document.getElementById('q-feedback');fb.textContent='\u2705 '+q.r;fb.className='ok';
    inp.className='ok';removeLetter(l);drawRosco();
    setTimeout(()=>{if(S.active)advance();},900);
  }else{
    S.letters[l]='wrong';S.wrong++;removeLetter(l);drawRosco();
    showPause('\u274C  ERA: '+q.r,()=>advance());
  }
}
function pasapalabra(){if(!S.active)return;const l=getCur();if(S.letters[l]==='pending')S.letters[l]='passed';S.curIdx=(S.curIdx+1)%Math.max(S.pending.length,1);drawRosco();showPause('\u21A9  PASAPALABRA',()=>loadQ());}
function removeLetter(l){const idx=S.pending.indexOf(l);if(idx!==-1)S.pending.splice(idx,1);S.curIdx=S.curIdx%Math.max(S.pending.length,1);}
function advance(){
  const rem=S.pending.filter(l=>S.letters[l]==='pending'||S.letters[l]==='passed');
  if(!rem.length){endGame();return;}S.pending=rem;S.curIdx=S.curIdx%rem.length;loadQ();
}
function endGame(){
  if(S.timer)clearInterval(S.timer);stopBlink();stopMicNow();S.active=false;
  document.getElementById('q-panel').style.display='none';document.getElementById('player-name-tag').style.display='none';document.getElementById('pause-overlay').style.display='none';
  document.getElementById('mic-float').className=''; // hide
  saveScore();renderInGameLB();
  const ep=document.getElementById('end-screen');ep.style.display='flex';ep.style.flexDirection='column';ep.style.alignItems='center';
  document.getElementById('end-name').textContent=S.name;document.getElementById('end-num').textContent=S.correct;
  const msg=[[26,'\u{1F3C6} ROSCO PERFECTO'],[20,'\u{1F31F} EXCELENTE'],[13,'\u{1F44D} MUY BIEN'],[0,'\u{1F4AA} SIGUE INTENTANDO']].find(([n])=>S.correct>=n)[1];
  document.getElementById('end-msg').textContent=msg;
  document.getElementById('end-sub').textContent=S.correct+' correctas \xB7 '+S.wrong+' incorrectas \xB7 '+fmtTime(Math.round(TOTAL_TIME-S.timeLeft));
  renderEndLB();drawRosco();
}
function newPlayer(){
  if(S.timer)clearInterval(S.timer);stopBlink();stopMicNow();S.active=false;paused=false;
  document.getElementById('q-panel').style.display='none';document.getElementById('player-name-tag').style.display='none';document.getElementById('end-screen').style.display='none';
  document.getElementById('mic-float').className=''; // hide
  renderInGameLB();
  const ss=document.getElementById('start-screen');ss.style.display='flex';ss.style.flexDirection='column';
  document.getElementById('name-inp').value='';initState(false);drawRosco();
}
document.getElementById('name-inp').addEventListener('keydown',e=>{if(e.key==='Enter')beginGame();});

// Prevent layout from jumping when soft keyboard appears on mobile
// We lock the stage to the initial visual viewport size
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{
    // Do NOT call layout() — keep stage fixed. Just re-draw rosco if needed.
    // The stage is position:fixed so it stays in place.
  });
}
window.addEventListener('resize',()=>{
  // On desktop resize is real; on mobile with keyboard it's a viewport resize.
  // Only re-layout if the window width changed (real resize), not just height (keyboard).
  if(!L.W||Math.abs(window.innerWidth-L.W)>10) layout();
});

initState(false);layout();
</script>
